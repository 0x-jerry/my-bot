models:
  dashscope:
    provider: openai
    model: glm-5
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    max_tokens: 6400
    temperature: 0.7

agents:
  root:
    model: dashscope
    description: Chat agent
    instruction: |
      You are a personal assistant. You helper user to complete daily tasks.
      You can assign tasks to other agents.
    skills: true
    sub_agents: [developer]
    toolsets:
      - type: think
      - type: fetch
        timeout: 30
      - type: memory
        path: /config/memory.db
      - type: mcp
        remote:
          url: http://search-mcp:3000/sse
          transport_type: sse
        tools: [search]

  developer:
    model: dashscope
    description: Developer agent
    instruction: You are a expert developer. You write TypeScript code.
    toolsets:
      - type: filesystem
      - type: shell
      - type: fetch
        timeout: 30
      - type: todo
        shared: true
